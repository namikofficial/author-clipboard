# git-cliff configuration for author-clipboard
# Generates changelogs from conventional commits
# Docs: https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/).

"""
body = """
{%- macro remote_url() -%}
  https://github.com/namikofficial/author-clipboard
{%- endmacro -%}

{% if version -%}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits
| filter(attribute="scope")
| sort(attribute="scope") %}
- **{{ commit.scope }}:** {{ commit.message }}
  {%- if commit.breaking %} [**BREAKING**]{% endif %}
{%- endfor -%}
{% for commit in commits %}
{%- if not commit.scope %}
- {{ commit.message }}
  {%- if commit.breaking %} [**BREAKING**]{% endif %}
{%- endif -%}
{%- endfor -%}
{% endfor %}
"""
footer = ""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
  { message = "^feat", group = "🚀 Features" },
  { message = "^fix", group = "🐛 Bug Fixes" },
  { message = "^doc", group = "📚 Documentation" },
  { message = "^perf", group = "⚡ Performance" },
  { message = "^refactor", group = "🔧 Refactoring" },
  { message = "^style", group = "🎨 Style" },
  { message = "^test", group = "🧪 Testing" },
  { message = "^build", group = "🏗️ Build" },
  { message = "^ci", group = "👷 CI" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore\\(deps\\)", group = "📦 Dependencies" },
  { message = "^chore", group = "🔨 Miscellaneous" },
  { message = "^revert", group = "⏪ Reverts" },
]
protect_breaking_commits = false
filter_commits = false
tag_pattern = "v[0-9].*"
sort_commits = "newest"
