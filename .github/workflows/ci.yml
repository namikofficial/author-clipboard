name: CI

on:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: Format / Lint / Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2
        with:
          # Only cache daemon/shared/ctl — applet (libcosmic) is excluded from CI
          cache-all-crates: "true"
          key: ci-no-applet

      # Minimal deps: only what daemon/shared/ctl need — skip heavy libcosmic deps
      - name: Install system dependencies
        run: |
          sudo apt-get install -y --no-install-recommends \
            libwayland-dev libxkbcommon-dev libdbus-1-dev pkg-config

      # Fast check — no compilation
      - name: Format check
        run: cargo fmt --all -- --check

      # Lint daemon/shared/ctl only (applet excluded — libcosmic takes 5+ min)
      - name: Clippy
        run: |
          cargo clippy \
            -p author-clipboard-shared \
            -p author-clipboard-daemon \
            -p author-clipboard-ctl \
            -- -D warnings

      # Tests live entirely in shared crate — no system deps beyond bundled sqlite
      - name: Tests
        run: cargo test -p author-clipboard-shared
